# App
spring.application.name=auth-system
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:file:./data/authdb;AUTO_SERVER=TRUE
# (PROD) spring.datasource.url=jdbc:postgresql://localhost:5432/authdb
spring.datasource.driver-class-name=org.h2.Driver
# (PROD) spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=sa
# (PROD) spring.datasource.username=${DB_USER}
spring.datasource.password=
# (PROD) spring.datasource.password=${DB_PASSWORD}

# H2 Console
spring.h2.console.enabled=true
# (PROD) spring.h2.console.enabled=false
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
# (PROD) spring.jpa.hibernate.ddl-auto=validate

# SQL
spring.jpa.show-sql=true
# (PROD) spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# (PROD) spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# No WARNING
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# JPA Schema
spring.jpa.defer-datasource-initialization=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Security
server.servlet.session.timeout=30m

# Cookie XSS
server.servlet.session.cookie.http-only=true

# Cookie HTTPS
server.servlet.session.cookie.secure=false
# (PROD) server.servlet.session.cookie.secure=true

# Cookie Fingerprinting
server.servlet.session.cookie.name=AUTH_SESSION

# Cookie CSRF
server.servlet.session.cookie.same-site=strict

# LOGGING
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=INFO
logging.level.com.akaPierre.authsystem=DEBUG

# Admin
# (PROD) app.admin.email=${ADMIN_EMAIL:admin@sistema.com}
# (PROD) app.admin.name=${ADMIN_NAME:Administrador}
# (PROD) app.admin.password=${ADMIN_PASSWORD:Admin@1234}